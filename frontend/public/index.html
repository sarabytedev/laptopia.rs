<!doctype html>
<html lang="sr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#002f70" />
        <meta name="description" content="Laptopia — specijalizovani servis laptopova i kompleksne elektronike." />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Sanchez&display=swap" rel="stylesheet" />
        <title>Laptopia.rs — Servis laptopova i elektronike</title>
        <script>
            // Suzbij neškodljive DataCloneError warning-e za PerformanceServerTiming u nekim brauzerima.
            window.addEventListener(
                "error",
                function (e) {
                    if (
                        e.error instanceof DOMException &&
                        e.error.name === "DataCloneError" &&
                        e.message &&
                        e.message.includes("PerformanceServerTiming")
                    ) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true,
            );
        </script>
    </head>
    <body>
        <noscript>Aktivirajte JavaScript da bi sajt radio.</noscript>
        <div id="root"></div>
    </body>
</html>
