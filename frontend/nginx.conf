# Docker internal DNS (127.0.0.11) — odlazi DNS upit u Docker daemon.
# Bitno: ovo dozvoljava nginx-u da starta čak i ako "backend" servis još nije up,
# i da resolve-uje hostname u request time umesto pri startu.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Lokalni healthcheck — uvek 200, nezavisan od backenda.
    # Coolify/Traefik i Docker HEALTHCHECK koriste ovo.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Cache static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map|webm|mp4|mov)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Proxy /api na backend servis u istoj compose mreži.
    # Varijabla $api_backend → DNS se resolvira pri zahtevu, ne pri startu nginx-a.
    location /api/ {
        set $api_backend "http://backend:8001";
        proxy_pass         $api_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Ako backend nije dostupan u trenutku zahteva, vrati 502 umesto rušenja konekcije.
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (basic)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
