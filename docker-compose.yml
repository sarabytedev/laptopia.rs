services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - laptopia

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Coolify magic: izloži servis na api.laptopia.rs (port 8001 unutar kontejnera).
      # Ako Coolify nije konfigurisao SERVICE_FQDN_BACKEND, fallback je hardkod ispod.
      SERVICE_FQDN_BACKEND_8001: ${SERVICE_FQDN_BACKEND_8001:-https://api.laptopia.rs}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DB_NAME: ${DB_NAME:-laptopia}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://laptopia.rs,https://www.laptopia.rs}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/api/', timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - laptopia

  frontend:
    # Multi-stage Dockerfile sam radi yarn install + yarn build (node stage),
    # pa kopira artefakte u nginx stage. Nema lokalnog build-a pre push-a.
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Coolify magic: izloži servis na laptopia.rs (port 80 unutar kontejnera).
      SERVICE_FQDN_FRONTEND_80: ${SERVICE_FQDN_FRONTEND_80:-https://laptopia.rs}
    # NAMERNO bez "depends_on" sa condition: service_healthy — frontend nginx mora
    # da starta nezavisno (DNS resolver odlaže resolve backend-a do prvog /api/ zahteva).
    # Ako bi čekao backend, a backend čeka mongo, i jedan health flap obara ceo stack.
    depends_on:
      - backend
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - laptopia

volumes:
  mongo-data:

networks:
  laptopia:
    driver: bridge
